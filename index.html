<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>m33</title>
    <style>
      :root {
        --bg: #AD1F2D;
        --text: #FFFCE1;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background-color: var(--bg);
        background-image: url("red.png");
        background-repeat: repeat;
        background-size: auto;
        color: var(--text);
        font-family: "Script MT Bold", "Brush Script MT", cursive;
      }

      .plane {
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .plane img {
        display: block;
        width: clamp(8rem, 40vw, 16rem);
        height: auto;
      }
    </style>
  </head>
  <body>
    <div class="plane">
      <img src="m33.png" alt="m33" />
    </div>
  </body>
</html>
